services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: okxbot_v2
      POSTGRES_USER: okxbot
      POSTGRES_PASSWORD: okxbot
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  pgadmin:
    image: dpage/pgadmin4:8
    depends_on:
      - postgres
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL:-admin@example.com}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD:-admin}
      PGADMIN_CONFIG_SERVER_MODE: "False"
      PGADMIN_CONFIG_MASTER_PASSWORD_REQUIRED: "False"
    ports:
      - "5050:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
      - ./pgadmin/servers.json:/pgadmin4/servers.json:ro

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  api:
    build:
      context: ./api
    restart: unless-stopped
    depends_on:
      - postgres
      - redis
    environment:
      APP_ENV: development
      DATABASE_URL: postgresql+psycopg2://okxbot:okxbot@postgres:5432/okxbot_v2
      REDIS_URL: redis://redis:6379/0
      ACCESS_TOKEN_SECRET: change-me-access
      REFRESH_TOKEN_SECRET: change-me-refresh
      PASSWORD_RESET_LINK_BASE: http://127.0.0.1:3000/reset-password
      PASSWORD_RESET_RETURN_TOKEN_IN_RESPONSE: "true"
      EMAIL_PROVIDER: resend
      EMAIL_FROM: ${EMAIL_FROM:-OKXStatBot <noreply@yourdomain.com>}
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      BOOTSTRAP_ADMIN_EMAIL: ${BOOTSTRAP_ADMIN_EMAIL:-}
      BOOTSTRAP_ADMIN_PASSWORD: ${BOOTSTRAP_ADMIN_PASSWORD:-}
      BOT_CONTROL_WORKSPACE_ROOT: /workspace
      BOT_CONTROL_COMMAND: python /workspace/Execution/main_execution.py
      STATBOT_EVENT_API_BASE: http://127.0.0.1:8080/api/v2
      STATBOT_BOT_PROCESS_MODE: runner
      STATBOT_PAIR_SUPPLY_PROCESS_MODE: runner
    ports:
      - "8082:8080"
    volumes:
      - ../:/workspace
    working_dir: /workspace/Platform/api
    command: >
      sh -c "pip install --no-cache-dir -r /workspace/Platform/api/requirements.txt &&
             alembic upgrade head &&
             uvicorn app.main:app --host 0.0.0.0 --port 8080 --reload --timeout-graceful-shutdown 5"

  bot-runner:
    build:
      context: ./api
    restart: unless-stopped
    depends_on:
      - api
      - postgres
      - redis
    environment:
      APP_ENV: development
      DATABASE_URL: postgresql+psycopg2://okxbot:okxbot@postgres:5432/okxbot_v2
      REDIS_URL: redis://redis:6379/0
      BOT_CONTROL_WORKSPACE_ROOT: /workspace
      BOT_CONTROL_COMMAND: python /workspace/Execution/main_execution.py
      STATBOT_EVENT_API_BASE: http://api:8080/api/v2
      STATBOT_PROCESS_OWNER: bot-runner
    volumes:
      - ../:/workspace
    working_dir: /workspace/Platform/api
    command: >
      sh -c "python -m app.process_runner bot"

  pair-supply-runner:
    build:
      context: ./api
    restart: unless-stopped
    depends_on:
      - api
      - postgres
      - redis
    environment:
      APP_ENV: development
      DATABASE_URL: postgresql+psycopg2://okxbot:okxbot@postgres:5432/okxbot_v2
      REDIS_URL: redis://redis:6379/0
      BOT_CONTROL_WORKSPACE_ROOT: /workspace
      STATBOT_EVENT_API_BASE: http://api:8080/api/v2
      STATBOT_PROCESS_OWNER: pair-supply-runner
    volumes:
      - ../:/workspace
    working_dir: /workspace/Platform/api
    command: >
      sh -c "python -m app.process_runner pair-supply"

  worker:
    build:
      context: ./worker
    depends_on:
      - redis
      - postgres
    environment:
      REDIS_URL: redis://redis:6379/0
      DATABASE_URL: postgresql+psycopg2://okxbot:okxbot@postgres:5432/okxbot_v2
    volumes:
      - ../:/workspace
    working_dir: /workspace/Platform/worker
    command: >
      sh -c "python worker.py"

  web:
    build:
      context: ./web
    depends_on:
      - api
    environment:
      NEXT_PUBLIC_API_BASE: http://127.0.0.1:8082/api/v2
      NEXT_PUBLIC_WS_BASE: ws://127.0.0.1:8082
    ports:
      - "3000:3000"
    volumes:
      - ../:/workspace
      - web_node_modules:/workspace/Platform/web/node_modules
      - web_next_dist:/workspace/Platform/web/.next
    working_dir: /workspace/Platform/web
    command: >
      sh -c "npm ci &&
             npm run dev -- --hostname 0.0.0.0 --port 3000"

volumes:
  pgdata:
  pgadmin_data:
  web_node_modules:
  web_next_dist:
